# Docker Compose конфигурация для NewCSSLearn
# Кодировка: UTF-8 без BOM
# Включает PHP приложение и MySQL базу данных

version: '3.8'

services:
  # PHP сервис с Apache
  php:
    build: .
    ports:
      - "8080:80"  # Проброс порта 80 контейнера на порт 8080 хоста
    volumes:
      - .:/var/www/html  # Монтирование текущей директории в /var/www/html контейнера
    depends_on:
      - db  # Зависимость от сервиса базы данных
    environment:
      DB_HOST: db  # Хост базы данных (имя сервиса)
      DB_NAME: p-351366_php-docker  # Имя базы данных
      DB_USER: p-351366_php-docker  # Пользователь базы данных
      DB_PASS: Anna-140275  # Пароль базы данных
    networks:
      - app-network  # Подключение к общей сети

  # Сервис базы данных MySQL
  db:
    image: mysql:8.0.34  # Образ MySQL версии 8.0.34
    environment:
      MYSQL_ROOT_PASSWORD: root  # Пароль root пользователя MySQL
      MYSQL_DATABASE: p-351366_php-docker  # Создание базы данных при старте
      MYSQL_USER: p-351366_php-docker  # Создание пользователя
      MYSQL_PASSWORD: Anna-140275  # Пароль пользователя
      MYSQL_INITDB_SKIP_TZINFO: 1  # Пропуск инициализации часовых поясов для ускорения
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./db-init.sql:/docker-entrypoint-initdb.d/db-init.sql:ro  # Скрипт создания таблиц
      - ./db-test-data.sql:/docker-entrypoint-initdb.d/db-test-data.sql:ro  # Скрипт тестовых данных
      - mysql_data:/var/lib/mysql  # Сохранение данных MySQL между перезапусками
    ports:
      - "3306:3306"  # Проброс порта MySQL для внешнего доступа (опционально)
    networks:
      - app-network  # Подключение к общей сети

# Определение volumes для сохранения данных
volumes:
  mysql_data:  # Volume для хранения данных MySQL

# Определение сети для коммуникации между сервисами
networks:
  app-network:
    driver: bridge  # Использование bridge драйвера сети
